# Default deployment: bridge network with port 8001 published to the host.
# Suitable for: bare docker-compose, aaPanel + Docker manager, custom reverse
# proxies (nginx, Caddy on host, Cloudflare Tunnel, etc.) that talk to
# 127.0.0.1:8001 on the host.
#
# For 1Panel users: use compose.1panel.sample.yaml so the container can reach
# the 1Panel-managed MySQL/Redis on the 1panel-network.
#
# For aaPanel native (openresty on host) users that prefer host networking:
# use compose.host.sample.yaml.
#
# Before running xboard:install, create the bind-mounted env file once:
#   [ ! -d .env ] || rm -rf .env
#   touch .env
services:
  xboard:
    image: xboard-plus:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPO_URL: https://github.com/xboardnext999/Xboard-Plus.git
        BRANCH_NAME: master
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./.env:/www/.env
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/logs:/www/storage/logs
      - ./storage/theme:/www/storage/theme
      - ./plugins:/www/plugins
      - redis-data:/data
    environment:
      - RESOURCE_PROFILE=balanced      # minimal | balanced | performance | auto
      - ENABLE_HORIZON=true
      - docker=true

volumes:
  redis-data:
