# Default deployment: bridge network with port 8002 published to the host.
# Suitable for: bare docker-compose, aaPanel + Docker manager, custom reverse
# proxies (nginx, Caddy on host, Cloudflare Tunnel, etc.) that talk to
# 127.0.0.1:8002 on the host.
#
# For 1Panel users: use compose.1panel.sample.yaml so the container can reach
# the 1Panel-managed MySQL/Redis on the 1panel-network.
#
# For aaPanel native (openresty on host) users that prefer host networking:
# use compose.host.sample.yaml.
#
# The entrypoint creates /config/.env automatically; no manual touch is needed.
services:
  xboard:
    image: xboard-plus:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./.docker/env:/config
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/app/public:/www/storage/app/public
      - ./storage/logs:/www/storage/logs
      - ./storage/theme:/www/storage/theme
      - ./plugins:/www/plugins
      - redis-data:/data
    environment:
      - RESOURCE_PROFILE=minimal       # minimal | balanced | performance | auto
      - ENABLE_HORIZON=false           # low-memory default: use one queue worker instead
      - ENABLE_QUEUE_WORKER=true
      - OCTANE_WORKERS=1
      - OCTANE_TASK_WORKERS=1
      - OCTANE_MAX_REQUESTS=300
      - OCTANE_GARBAGE_MB=64
      - HORIZON_DATA_PIPELINE_MAX=1
      - HORIZON_BUSINESS_MAX=1
      - HORIZON_NOTIFICATION_MAX=1
      - HORIZON_WORKER_MEMORY_MB=128
      - HORIZON_WORKER_MAX_TIME=3600
      - HORIZON_WORKER_MAX_JOBS=500
      - docker=true

volumes:
  redis-data:
