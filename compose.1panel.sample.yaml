# Deployment for 1Panel users.
#
# 1Panel runs MySQL/Redis as separate containers on a Docker network named
# `1panel-network`. To let Xboard reach them by their container hostname
# (e.g. `1Panel-mysql-xxxx`), this compose file joins that external network
# in addition to publishing port 8002 for 1Panel's reverse proxy / website.
#
# During `php artisan xboard:install`, set:
#   - Database Host: the container name shown in 1Panel under
#                    Database -> Connection Info -> Host
#   - Redis: choose the built-in Redis (already provided by this image)
#
# The entrypoint creates /config/.env automatically; no manual touch is needed.
services:
  xboard:
    image: xboard-plus:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    ports:
      - "8002:8002"
    networks:
      - default
      - 1panel-network
    volumes:
      - ./.docker/env:/config
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/app/public:/www/storage/app/public
      - ./storage/logs:/www/storage/logs
      - ./storage/theme:/www/storage/theme
      - ./plugins:/www/plugins
      - redis-data:/data
    environment:
      - RESOURCE_PROFILE=minimal       # minimal | balanced | performance | auto
      - ENABLE_HORIZON=false           # low-memory default: use one queue worker instead
      - ENABLE_QUEUE_WORKER=true
      - OCTANE_WORKERS=1
      - OCTANE_TASK_WORKERS=1
      - OCTANE_MAX_REQUESTS=300
      - OCTANE_GARBAGE_MB=64
      - HORIZON_DATA_PIPELINE_MAX=1
      - HORIZON_BUSINESS_MAX=1
      - HORIZON_NOTIFICATION_MAX=1
      - HORIZON_WORKER_MEMORY_MB=128
      - HORIZON_WORKER_MAX_TIME=3600
      - HORIZON_WORKER_MAX_JOBS=500
      - docker=true

networks:
  1panel-network:
    external: true

volumes:
  redis-data:
