#
# The entrypoint creates /config/.env automatically; no manual touch is needed.
services:
  xboard:
    image: xboard-plus:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./.docker/env:/config
      - ./.docker/.data/:/www/.docker/.data
      - ./storage/app/public:/www/storage/app/public
      - ./storage/logs:/www/storage/logs
      - ./storage/theme:/www/storage/theme
      - ./plugins:/www/plugins
      - redis-data:/data
    environment:
      - RESOURCE_PROFILE=balanced      # minimal | balanced | performance | auto
      - ENABLE_HORIZON=true
      - docker=true

volumes:
  redis-data:
