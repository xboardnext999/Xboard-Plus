<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no">
  <title>Xboard Plus</title>
  <link rel="stylesheet" href="./assets/app/styles.css">
</head>

<body>
  <script src="./env.js"></script>
  <div id="app"></div>
  <script type="module">
    const manifest = await fetch("./assets/app/manifest.json").then((response) => response.json());
    const entry = Object.values(manifest).find((chunk) => chunk && chunk.isEntry);
    if (!entry?.file) throw new Error("User React entry is missing");
    await import(`./assets/app/${entry.file}`);
  </script>
</body>

</html>
